name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  build-and-synth:
    name: Build & Synth
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: CDK Synth
        run: npx cdk synth
        env:
          # Synth does not need real credentials — dummy values satisfy the SDK
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_DEFAULT_REGION: eu-central-1
